version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticket-analyzer-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./knowledge_base:/knowledge_base
      - ./tickets.csv:/app/tickets.csv
      - db_data:/app/db
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///app/db/tickets.db
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ticket-analyzer-frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend/src:/usr/share/nginx/html
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
