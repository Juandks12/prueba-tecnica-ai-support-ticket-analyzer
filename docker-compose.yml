services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticket-analyzer-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./knowledge_base:/knowledge_base
      - ./dataset/tickets.csv:/app/tickets.csv
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ticket-analyzer-frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend/src:/usr/share/nginx/html
    depends_on:
      - backend
    restart: unless-stopped
